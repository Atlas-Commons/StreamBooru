name: Publish AUR (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g., v1.0.2 or v1.1.0-beta.1)"
        required: true
        type: string
      channel:
        description: "AUR channel"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: read

jobs:
  aur:
    if: contains(github.server_url, 'github.com')
    runs-on: ubuntu-latest
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
      AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - name: Parse metadata
        id: meta
        run: |
          REF="${{ inputs.tag }}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY%%/*}" >> "$GITHUB_OUTPUT"
          echo "repo=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"

      - name: Resolve AUR package
        id: pkg
        run: |
          if [ "${{ inputs.channel }}" = "beta" ]; then
            echo "pkgname=${{ secrets.AUR_PACKAGE_BETA }}" >> "$GITHUB_OUTPUT"
            echo "conflicts='streambooru' 'streambooru-bin'" >> "$GITHUB_OUTPUT"
            echo "suffix= (pre-release)" >> "$GITHUB_OUTPUT"
          else
            echo "pkgname=${{ secrets.AUR_PACKAGE }}" >> "$GITHUB_OUTPUT"
            echo "conflicts='streambooru' 'streambooru-bin-beta'" >> "$GITHUB_OUTPUT"
            echo "suffix=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check AUR secrets
        id: check
        shell: bash
        run: |
          publish=true
          if [ -z "${AUR_SSH_PRIVATE_KEY}" ] || [ -z "${AUR_USERNAME}" ] || [ -z "${{ steps.pkg.outputs.pkgname }}" ]; then
            publish=false
          fi
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"

      - name: Generate PKGBUILD
        if: steps.check.outputs.publish == 'true'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          OWNER:   ${{ steps.meta.outputs.owner }}
          REPO:    ${{ steps.meta.outputs.repo }}
        run: |
          chmod +x scripts/publish-aur.sh
          ./scripts/publish-aur.sh \
            "${VERSION}" "${OWNER}" "${REPO}" \
            "${{ steps.pkg.outputs.pkgname }}" \
            "${{ steps.pkg.outputs.conflicts }}" \
            "${{ steps.pkg.outputs.suffix }}"

      - name: Publish to AUR
        if: steps.check.outputs.publish == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.1
        with:
          pkgname: ${{ steps.pkg.outputs.pkgname }}
          pkgbuild: aur-out/PKGBUILD
          assets: |
            aur-out/.SRCINFO
            aur/streambooru.sh
            aur/streambooru.desktop
          commit_username: "github-actions[bot]"
          commit_email: "41898282+github-actions[bot]@users.noreply.github.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          ssh_keyscan_types: rsa,ecdsa,ed25519
